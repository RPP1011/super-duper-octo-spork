<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adversarial Layout Visualizer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
  #header { padding: 12px 20px; background: #16213e; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  #header h1 { font-size: 16px; color: #a0c4ff; white-space: nowrap; }
  .tab { padding: 6px 14px; border-radius: 4px; cursor: pointer; background: #0f3460; color: #ccc; font-size: 13px; border: 1px solid #1a4a7a; transition: all 0.15s; }
  .tab:hover { background: #1a5a9a; }
  .tab.active { background: #e94560; color: #fff; border-color: #e94560; }
  #info { padding: 8px 20px; background: #16213e99; font-size: 12px; color: #888; }
  #container { width: 100vw; height: calc(100vh - 90px); }
  canvas { display: block; }
</style>
</head>
<body>

<div id="header">
  <h1>Layout Viz</h1>
  <div id="tabs"></div>
</div>
<div id="info">Click + drag to orbit, scroll to zoom, right-click to pan</div>
<div id="container"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Layout builders ──────────────────────────────────────────────

function makeGrid(cols, rows) {
  // walkable[r][c], elevation[r][c]
  const walkable = Array.from({length: rows}, () => Array(cols).fill(true));
  const elevation = Array.from({length: rows}, () => Array(cols).fill(0));
  // Block perimeter
  for (let c = 0; c < cols; c++) { walkable[0][c] = false; walkable[rows-1][c] = false; }
  for (let r = 0; r < rows; r++) { walkable[r][0] = false; walkable[r][cols-1] = false; }
  return { cols, rows, walkable, elevation,
    block(c, r) { if (c >= 0 && c < cols && r >= 0 && r < rows) walkable[r][c] = false; }
  };
}

const builders = {
  'Pillar Line'() {
    const g = makeGrid(20, 20);
    for (let r = 2; r < 18; r += 2) g.block(10, r);
    return g;
  },
  'Open Field'() {
    const g = makeGrid(32, 32);
    for (const [bc, br] of [[8,8],[8,23],[23,8],[23,23]])
      for (let dc = 0; dc < 3; dc++) for (let dr = 0; dr < 3; dr++) g.block(bc+dc, br+dr);
    return g;
  },
  'Uniform Grid'() {
    const g = makeGrid(20, 20);
    for (let r = 3; r < 17; r += 3) for (let c = 3; c < 17; c += 3) g.block(c, r);
    return g;
  },
  'Maze'() {
    const g = makeGrid(20, 20);
    for (let r = 3; r < 17; r += 3) {
      const gapCol = (Math.floor(r/3) % 2 === 0) ? 18 : 1;
      for (let c = 1; c < 19; c++) { if (c !== gapCol) g.block(c, r); }
    }
    return g;
  },
  'Spiky Zigzag'() {
    const g = makeGrid(24, 20);
    const tw = 3, th = 5, baseR = 10 - Math.floor(th/2);
    const nTeeth = Math.floor((24-4)/tw);
    for (let t = 0; t < nTeeth; t++) {
      const sc = 2 + t * tw;
      for (let s = 0; s < th; s++) {
        const c1 = sc + Math.floor(s*tw/(th*2)), r1 = baseR + s;
        if (c1 < 23 && r1 < 19) g.block(c1, r1);
        const c2 = sc + tw - 1 - Math.floor(s*tw/(th*2)), r2 = baseR + s;
        if (c2 < 23 && r2 < 19) g.block(c2, r2);
      }
    }
    for (let c = 2; c < 22; c++) g.block(c, 10);
    return g;
  },
  'Checker Ramp'() {
    const g = makeGrid(24, 24);
    for (let r = 2; r < 22; r++) for (let c = 2; c < 22; c++)
      if ((r+c) % 2 === 0) g.block(c, r);
    for (let r = 0; r < 24; r++) for (let c = 0; c < 24; c++)
      g.elevation[r][c] = (c / 24) * 1.5;
    return g;
  },
  'Symmetric Arena'() {
    const g = makeGrid(30, 30);
    for (const [bc,br] of [[5,5],[5,24],[24,5],[24,24]])
      for (let i = 0; i < 4; i++) { g.block(bc+i, br); g.block(bc, br+i); }
    for (let c = 10; c < 20; c++) { g.block(c, 10); g.block(c, 19); }
    for (let r = 10; r < 20; r++) { g.block(10, r); g.block(19, r); }
    return g;
  }
};

// ── Three.js setup ───────────────────────────────────────────────

const container = document.getElementById('container');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x1a1a2e);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 200);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// Lighting
const ambient = new THREE.AmbientLight(0x404060, 0.6);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
dirLight.position.set(20, 30, 15);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.near = 1; dirLight.shadow.camera.far = 80;
dirLight.shadow.camera.left = -25; dirLight.shadow.camera.right = 25;
dirLight.shadow.camera.top = 25; dirLight.shadow.camera.bottom = -25;
scene.add(dirLight);

// Materials
const floorMat = new THREE.MeshStandardMaterial({ color: 0x3a3a5c, roughness: 0.9 });
const wallMat  = new THREE.MeshStandardMaterial({ color: 0x8a4a4a, roughness: 0.7 });
const spawnPlayerMat = new THREE.MeshStandardMaterial({ color: 0x4a9aff, roughness: 0.5, emissive: 0x1a3a6a });
const spawnEnemyMat  = new THREE.MeshStandardMaterial({ color: 0xff4a4a, roughness: 0.5, emissive: 0x6a1a1a });

let layoutGroup = null;

function buildScene(name) {
  if (layoutGroup) { scene.remove(layoutGroup); layoutGroup.traverse(o => { if (o.geometry) o.geometry.dispose(); }); }
  layoutGroup = new THREE.Group();

  const g = builders[name]();
  const { cols, rows, walkable, elevation } = g;
  const cx = cols / 2, cz = rows / 2;

  // Instanced floor tiles
  const tileGeo = new THREE.BoxGeometry(0.95, 0.15, 0.95);
  const floorCount = walkable.flat().filter(Boolean).length;
  const floorMesh = new THREE.InstancedMesh(tileGeo, floorMat, floorCount);
  floorMesh.receiveShadow = true;
  const mat4 = new THREE.Matrix4();
  let fi = 0;
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    if (!walkable[r][c]) continue;
    const e = elevation[r][c];
    mat4.makeTranslation(c - cx + 0.5, e, r - cz + 0.5);
    floorMesh.setMatrixAt(fi++, mat4);
  }
  layoutGroup.add(floorMesh);

  // Instanced wall blocks
  const wallGeo = new THREE.BoxGeometry(0.95, 1.2, 0.95);
  const wallCount = walkable.flat().filter(v => !v).length;
  const wallMesh = new THREE.InstancedMesh(wallGeo, wallMat, wallCount);
  wallMesh.castShadow = true;
  wallMesh.receiveShadow = true;
  let wi = 0;
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    if (walkable[r][c]) continue;
    const e = elevation[r][c];
    mat4.makeTranslation(c - cx + 0.5, e + 0.6, r - cz + 0.5);
    wallMesh.setMatrixAt(wi++, mat4);
  }
  layoutGroup.add(wallMesh);

  // Spawn markers
  const markerGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.05, 16);
  const pc = { x: 3, y: rows / 2 }, ec = { x: cols - 3, y: rows / 2 };
  for (const [dx, dz] of [[-0.5,-0.5],[0.5,-0.5],[-0.5,0.5],[0.5,0.5]]) {
    const pm = new THREE.Mesh(markerGeo, spawnPlayerMat);
    pm.position.set(pc.x + dx - cx + 0.5, 0.2, pc.y + dz - cz + 0.5);
    layoutGroup.add(pm);
    const em = new THREE.Mesh(markerGeo, spawnEnemyMat);
    em.position.set(ec.x + dx - cx + 0.5, 0.2, ec.y + dz - cz + 0.5);
    layoutGroup.add(em);
  }

  scene.add(layoutGroup);

  // Camera
  const dist = Math.max(cols, rows) * 0.9;
  camera.position.set(0, dist * 0.7, dist * 0.5);
  controls.target.set(0, 0, 0);
  controls.update();
}

// ── Tabs ─────────────────────────────────────────────────────────

const tabContainer = document.getElementById('tabs');
const names = Object.keys(builders);
let activeTab = null;

for (const name of names) {
  const btn = document.createElement('div');
  btn.className = 'tab';
  btn.textContent = name;
  btn.addEventListener('click', () => {
    if (activeTab) activeTab.classList.remove('active');
    btn.classList.add('active');
    activeTab = btn;
    buildScene(name);
  });
  tabContainer.appendChild(btn);
}

// Start with first layout
tabContainer.children[0].click();

// ── Resize + animate ─────────────────────────────────────────────

window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
