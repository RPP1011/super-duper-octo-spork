oe", "ability": "Spell Thief", "category": "damage_unit"}, {"x": -0.5906123045717835, "y": 0.01969146950486691, "hero": "Zoe", "ability": "Sleepy Trouble Bubble", "category": "damage_aoe"}, {"x": 0.5506472859210714, "y": 0.43082869660385115, "hero": "Zoe", "ability": "Portal Jump", "category": "utility"}, {"x": -0.538062676658709, "y": -0.01974965809590216, "hero": "Zyra", "ability": "Deadly Spines", "category": "damage_aoe"}, {"x": 0.37729870359879775, "y": 0.5014437428212545, "hero": "Zyra", "ability": "Rampant Growth", "category": "cc_unit"}, {"x": -0.5711416828897901, "y": 0.0033026722548949923, "hero": "Zyra", "ability": "Grasping Roots", "category": "damage_aoe"}, {"x": 0.2576845786494359, "y": 0.6678085875305856, "hero": "Zyra", "ability": "Stranglethorns", "category": "summon"}];
const CAT_COLORS = {"damage_unit": "#ef4444", "damage_aoe": "#f97316", "cc_unit": "#a855f7", "heal_unit": "#22c55e", "heal_aoe": "#10b981", "defense": "#3b82f6", "utility": "#eab308", "summon": "#06b6d4", "obstacle": "#78716c"};
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const searchBox = document.getElementById('search');

let dpr = window.devicePixelRatio || 1;
let W, H;
let activeCategories = new Set(Object.keys(CAT_COLORS));
let searchFilter = '';
let hoveredIdx = -1;

// Compute bounds
let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
for (const p of POINTS) {
  if (p.x < minX) minX = p.x;
  if (p.x > maxX) maxX = p.x;
  if (p.y < minY) minY = p.y;
  if (p.y > maxY) maxY = p.y;
}
const pad = 0.08;
const rangeX = (maxX - minX) || 1;
const rangeY = (maxY - minY) || 1;
minX -= rangeX * pad; maxX += rangeX * pad;
minY -= rangeY * pad; maxY += rangeY * pad;

function toScreen(px, py) {
  return [
    ((px - minX) / (maxX - minX)) * W,
    ((py - minY) / (maxY - minY)) * H,
  ];
}

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}

function isVisible(p, idx) {
  if (!activeCategories.has(p.category)) return false;
  if (searchFilter && !p.ability.toLowerCase().includes(searchFilter) &&
      !p.hero.toLowerCase().includes(searchFilter)) return false;
  return true;
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Draw dimmed points first
  for (let i = 0; i < POINTS.length; i++) {
    const p = POINTS[i];
    if (isVisible(p, i)) continue;
    const [sx, sy] = toScreen(p.x, p.y);
    ctx.beginPath();
    ctx.arc(sx, sy, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(60,60,70,0.3)';
    ctx.fill();
  }

  // Draw active points
  for (let i = 0; i < POINTS.length; i++) {
    const p = POINTS[i];
    if (!isVisible(p, i)) continue;
    const [sx, sy] = toScreen(p.x, p.y);
    const r = (i === hoveredIdx) ? 8 : 5;
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fillStyle = CAT_COLORS[p.category] || '#888';
    ctx.globalAlpha = (i === hoveredIdx) ? 1.0 : 0.8;
    ctx.fill();
    ctx.globalAlpha = 1.0;
    if (i === hoveredIdx) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  // Draw labels for search matches when few results
  if (searchFilter) {
    const matches = POINTS.filter((p, i) => isVisible(p, i));
    if (matches.length <= 20) {
      ctx.font = '11px ui-sans-serif, system-ui, sans-serif';
      ctx.fillStyle = '#e8eaf0';
      ctx.textAlign = 'left';
      for (const p of matches) {
        const [sx, sy] = toScreen(p.x, p.y);
        ctx.fillText(p.ability, sx + 8, sy + 3);
      }
    }
  }
}

// Legend
const legend = document.getElementById('legend');
const catCounts = {};
for (const p of POINTS) catCounts[p.category] = (catCounts[p.category] || 0) + 1;
for (const cat of Object.keys(CAT_COLORS).sort()) {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${CAT_COLORS[cat]}"></span>${cat}<span class="legend-count">${catCounts[cat] || 0}</span>`;
  item.addEventListener('click', () => {
    if (activeCategories.has(cat)) {
      activeCategories.delete(cat);
      item.classList.add('dimmed');
    } else {
      activeCategories.add(cat);
      item.classList.remove('dimmed');
    }
    draw();
  });
  legend.appendChild(item);
}

// Stats
document.getElementById('stats').textContent =
  `${POINTS.length} abilities from ${new Set(POINTS.map(p => p.hero)).size} heroes`;

// Search
searchBox.addEventListener('input', (e) => {
  searchFilter = e.target.value.toLowerCase();
  draw();
});

// Hover
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  let closest = -1, closestDist = 15;
  for (let i = 0; i < POINTS.length; i++) {
    if (!isVisible(POINTS[i], i)) continue;
    const [sx, sy] = toScreen(POINTS[i].x, POINTS[i].y);
    const d = Math.hypot(sx - mx, sy - my);
    if (d < closestDist) { closestDist = d; closest = i; }
  }
  if (closest !== hoveredIdx) {
    hoveredIdx = closest;
    draw();
    if (closest >= 0) {
      const p = POINTS[closest];
      document.getElementById('tt-name').textContent = p.ability;
      document.getElementById('tt-hero').textContent = p.hero;
      document.getElementById('tt-cat').textContent = p.category;
      document.getElementById('tt-cat').style.color = CAT_COLORS[p.category];
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
    } else {
      tooltip.style.display = 'none';
    }
  } else if (closest >= 0) {
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  }
});

canvas.addEventListener('mouseleave', () => {
  hoveredIdx = -1;
  tooltip.style.display = 'none';
  draw();
});

window.addEventListener('resize', resize);
resize();
</script>
