<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Viewer</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div id="top-bar">
  <span class="status-text">Game Viewer</span>
  <select id="scenario-select"><option>Loading...</option></select>
  <label>Seed: <input type="number" id="seed-input" placeholder="random" style="width:80px"></label>
  <label>Interval: <input type="number" id="interval-input" value="30" min="1" max="100" style="width:60px"></label>
  <label style="margin-left:8px"><input type="checkbox" id="goap-checkbox"> GOAP</label>
  <button class="btn-start" id="btn-start">START</button>
  <span id="game-status" class="status-text" style="margin-left:auto;">IDLE</span>
</div>

<div id="main-area">
  <div id="canvas-panel">
    <canvas id="battlefield" width="700" height="500"></canvas>
  </div>
  <div id="sidebar">
    <div id="unit-table-container">
      <h3>Units</h3>
      <table id="unit-table">
        <thead><tr><th>ID</th><th>Team</th><th>Role</th><th>HP</th><th>Pos</th><th>Status</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div id="event-log-container">
      <h3>Events</h3>
      <div id="event-log"></div>
    </div>
  </div>
</div>

<div id="controls">
  <div class="group">
    <span class="group-label">Playback</span>
    <button id="btn-pause" class="btn-pause" disabled>PAUSE</button>
    <button id="btn-step" disabled>STEP</button>
    <select id="speed-select">
      <option value="1000">Slow</option>
      <option value="500" selected>Normal</option>
      <option value="200">Fast</option>
      <option value="50">Turbo</option>
    </select>
  </div>

  <div class="separator"></div>

  <div class="group">
    <span class="group-label">Formation</span>
    <button class="formation-btn" data-mode="Advance">ADVANCE</button>
    <button class="formation-btn active" data-mode="Hold">HOLD</button>
    <button class="formation-btn" data-mode="Retreat">RETREAT</button>
  </div>

  <div class="separator"></div>

  <div class="group">
    <span class="group-label">Focus</span>
    <div id="focus-buttons">
      <button id="btn-clear-focus">CLEAR FOCUS</button>
    </div>
  </div>

  <div class="separator"></div>

  <div class="group">
    <span class="group-label">Preset</span>
    <button class="preset-btn" data-preset="aggressive">AGGRESSIVE</button>
    <button class="preset-btn" data-preset="defensive">DEFENSIVE</button>
    <button class="preset-btn" data-preset="balanced">BALANCED</button>
    <button class="preset-btn" data-preset="cc_heavy">CC HEAVY</button>
  </div>
</div>

<div id="status-summary">No game running</div>

<script src="/static/game.js"></script>
</body>
</html>
