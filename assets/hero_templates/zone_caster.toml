# Tanky enemy that drops a lethal one-shot ground zone on a long cooldown.
# Long cast time = threat window to run away. Zone fires once then disappears.
# Long cooldown = safe window to re-engage and deal damage.
# Teaches: see cast → run away → zone fires → run back in → attack.
[hero]
name = "ZoneCaster"

[stats]
hp = 3000
move_speed = 1.0

[attack]
damage = 12
range = 1.5
cooldown = 1200
cast_time = 300

# --- Danger Zone --- 150 dmg instant in r=3.0, 1.5s cast, 15s cooldown
# One-shot: fires once immediately on landing (tick_interval = duration = short).
# 150 dmg is near-lethal for most heroes (warrior has 180 HP).
# 1500ms cast = "get out NOW" signal. 15s cooldown = plenty of time to attack.
[[abilities]]
name = "DangerZone"
targeting = "ground_target"
range = 6.0
cooldown_ms = 15000
cast_time_ms = 1500
ai_hint = "damage"

[abilities.delivery]
method = "zone"
duration_ms = 500
tick_interval_ms = 500

[[abilities.effects]]
type = "damage"
amount = 70

[abilities.effects.area]
shape = "circle"
radius = 3.0

[abilities.effects.tags]
FIRE = 50.0
