<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IMPALA Training Console</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');

:root {
  --bg-0: #0a0c10;
  --bg-1: #12151c;
  --bg-2: #1a1e28;
  --bg-3: #242935;
  --border: #2d3344;
  --border-bright: #3d4460;
  --text-0: #e8ecf4;
  --text-1: #a0a8be;
  --text-2: #6b7394;
  --amber: #f5a623;
  --amber-dim: #f5a62344;
  --green: #34d399;
  --green-dim: #34d39933;
  --red: #f87171;
  --red-dim: #f8717133;
  --cyan: #67e8f9;
  --cyan-dim: #67e8f933;
  --purple: #c084fc;
  --purple-dim: #c084fc33;
  --blue: #60a5fa;
  --blue-dim: #60a5fa33;
  --orange: #fb923c;
  --chart-grid: #1e2233;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --font-sans: 'DM Sans', system-ui, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-0);
  color: var(--text-0);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  overflow-x: hidden;
}

/* ── Scanline overlay ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.03) 2px,
    rgba(0, 0, 0, 0.03) 4px
  );
  z-index: 9999;
}

/* ── Top bar ── */
.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 24px;
  background: var(--bg-1);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.topbar-title {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.5px;
  color: var(--amber);
  white-space: nowrap;
}

.topbar-title span {
  color: var(--text-2);
  font-weight: 400;
}

.topbar-tabs {
  display: flex;
  gap: 2px;
  margin-left: 32px;
}

.topbar-tab {
  padding: 6px 16px;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  background: transparent;
  border: 1px solid transparent;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.topbar-tab:hover {
  color: var(--text-1);
  background: var(--bg-2);
}

.topbar-tab.active {
  color: var(--amber);
  background: var(--bg-2);
  border-color: var(--border);
}

.topbar-status {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-2);
}

.topbar-status .live {
  color: var(--green);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ── Layout ── */
.panels {
  display: none;
  padding: 20px;
  gap: 16px;
}

.panels.active { display: grid; }

#panel-training {
  grid-template-columns: 260px 1fr;
  grid-template-rows: auto 1fr;
}

#panel-scenarios {
  grid-template-columns: 320px 1fr;
  grid-template-rows: 1fr;
  height: calc(100vh - 56px);
}

/* ── Cards ── */
.card {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-1);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.card-header .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--amber);
}

.card-body {
  padding: 12px 14px;
}

/* ── Experiment sidebar ── */
.exp-list {
  list-style: none;
}

.exp-item {
  padding: 8px 12px;
  border-bottom: 1px solid var(--bg-2);
  cursor: pointer;
  transition: background 0.1s;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.exp-item:hover { background: var(--bg-2); }
.exp-item.selected { background: var(--bg-3); border-left: 2px solid var(--amber); }

.exp-item .name {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-0);
}

.exp-item .meta {
  font-size: 11px;
  color: var(--text-2);
}

.phase-pills {
  display: flex;
  gap: 4px;
  margin-top: 4px;
}

.phase-pill {
  padding: 2px 6px;
  font-family: var(--font-mono);
  font-size: 10px;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.1s;
}

.phase-pill { background: var(--bg-2); color: var(--text-2); border: 1px solid var(--border); }
.phase-pill:hover { color: var(--text-1); border-color: var(--border-bright); }
.phase-pill.active { color: var(--amber); border-color: var(--amber); background: var(--amber-dim); }

/* ── Stat row ── */
.stat-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  grid-column: 1 / -1;
}

.stat-box {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.stat-box .label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.stat-box .value {
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 700;
}

.stat-box .sub {
  font-size: 11px;
  color: var(--text-2);
}

.stat-box.good .value { color: var(--green); }
.stat-box.warn .value { color: var(--amber); }
.stat-box.bad .value { color: var(--red); }
.stat-box.info .value { color: var(--cyan); }

/* ── Charts area ── */
.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.chart-card {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px;
}

.chart-card.wide { grid-column: 1 / -1; }

.chart-title {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-1);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 8px;
}

.chart-svg {
  width: 100%;
  overflow: visible;
}

.chart-svg .axis text {
  font-family: var(--font-mono);
  font-size: 10px;
  fill: var(--text-2);
}

.chart-svg .axis line,
.chart-svg .axis path {
  stroke: var(--border);
}

.chart-svg .grid line {
  stroke: var(--chart-grid);
  stroke-dasharray: 2 4;
}

/* ── Comparison toggles ── */
.compare-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding: 8px 14px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
}

.compare-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  border-radius: 3px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.1s;
  color: var(--text-2);
}

.compare-chip .swatch {
  width: 8px;
  height: 8px;
  border-radius: 2px;
}

.compare-chip.on {
  border-color: var(--border-bright);
  color: var(--text-0);
  background: var(--bg-3);
}

/* ── Scenario panel ── */
.scenario-list {
  height: calc(100vh - 110px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.scenario-item {
  display: grid;
  grid-template-columns: 1fr 60px;
  align-items: center;
  padding: 6px 12px;
  border-bottom: 1px solid var(--bg-2);
  cursor: pointer;
  transition: background 0.1s;
  font-size: 12px;
}

.scenario-item:hover { background: var(--bg-2); }
.scenario-item.selected { background: var(--bg-3); border-left: 2px solid var(--cyan); }

.scenario-item .sname {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-0);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.scenario-item .swr {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  text-align: right;
}

.scenario-search {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg-0);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-0);
  font-family: var(--font-mono);
  font-size: 12px;
  outline: none;
  margin-bottom: 8px;
}

.scenario-search:focus { border-color: var(--cyan); }

/* ── Replay viewer ── */
.replay-container {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 110px);
}

.replay-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.replay-header .scenario-name {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-0);
}

.replay-header .outcome-badge {
  padding: 2px 8px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
}

.outcome-badge.Victory { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
.outcome-badge.Defeat { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }
.outcome-badge.Timeout { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber); }

.replay-canvas-wrap {
  flex: 1;
  position: relative;
  background: var(--bg-0);
  overflow: hidden;
}

#replay-canvas {
  width: 100%;
  height: 100%;
}

.replay-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  background: var(--bg-2);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.replay-btn {
  padding: 4px 12px;
  background: var(--bg-3);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-0);
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.1s;
}

.replay-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.replay-btn.active { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }

.replay-slider {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: var(--bg-3);
  border-radius: 2px;
  outline: none;
}

.replay-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  background: var(--cyan);
  border-radius: 50%;
  cursor: pointer;
}

.replay-tick-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-2);
  min-width: 80px;
}

/* ── Episode picker ── */
.episode-picker {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  padding: 8px 14px;
  background: var(--bg-1);
  border-bottom: 1px solid var(--border);
  max-height: 80px;
  overflow-y: auto;
}

.ep-chip {
  padding: 2px 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  border-radius: 3px;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: all 0.1s;
}

.ep-chip:hover { border-color: var(--border-bright); }
.ep-chip.active { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-dim); }
.ep-chip.Victory { color: var(--green); }
.ep-chip.Defeat { color: var(--red); }
.ep-chip.Timeout { color: var(--amber); }

/* ── Info panel beside replay ── */
.replay-info {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 12px 14px;
  background: var(--bg-1);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  max-height: 180px;
  overflow-y: auto;
}

.step-info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 6px;
}

.step-info-item {
  display: flex;
  flex-direction: column;
}

.step-info-item .si-label {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.step-info-item .si-value {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-0);
}

/* ── Entity legend ── */
.entity-legend {
  display: flex;
  gap: 16px;
  padding: 4px 14px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-2);
}

.entity-legend .leg-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

.entity-legend .leg-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }

/* ── Empty state ── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 300px;
  color: var(--text-2);
  font-family: var(--font-mono);
  font-size: 13px;
  gap: 8px;
}

.empty-state .big { font-size: 32px; opacity: 0.3; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-title">V5 <span>// training console</span></div>
  <div class="topbar-tabs">
    <button class="topbar-tab active" data-panel="curriculum">Curriculum</button>
    <button class="topbar-tab" data-panel="scenarios">Scenarios</button>
  </div>
  <div class="topbar-status" id="status-text"></div>
</div>

<!-- Curriculum panel -->
<div class="panels active" id="panel-curriculum">
  <div class="card" style="grid-column: 1 / -1;">
    <div class="card-header"><span class="dot"></span> Curriculum Progress</div>
    <div class="card-body">
      <div id="curriculum-overview"></div>
      <div id="curriculum-chart" style="margin-top:16px;"></div>
      <div id="curriculum-drill-detail" style="margin-top:16px;"></div>
    </div>
  </div>
</div>

<!-- Scenarios panel -->
<div class="panels" id="panel-scenarios">
  <div class="card">
    <div class="card-header"><span class="dot"></span> Scenarios</div>
    <div class="card-body">
      <div style="display:flex;gap:8px;margin-bottom:8px;">
        <select id="sc-exp-select" class="scenario-search" style="width:50%"></select>
        <select id="sc-phase-select" class="scenario-search" style="width:50%"></select>
      </div>
      <input type="text" class="scenario-search" id="scenario-search" placeholder="Search scenarios...">
      <div class="scenario-list" id="scenario-list"></div>
    </div>
  </div>
  <div class="card" style="display:flex;flex-direction:column;">
    <div class="replay-header" id="replay-header">
      <span class="scenario-name" id="replay-scenario-name">Select a scenario</span>
    </div>
    <div class="episode-picker" id="episode-picker"></div>
    <div class="episode-picker" id="unit-picker" style="border-bottom:1px solid var(--border);gap:8px;align-items:center;">
      <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-2);text-transform:uppercase;letter-spacing:0.5px;">Unit:</span>
    </div>
    <div class="entity-legend" id="entity-legend">
      <div class="leg-item"><div class="leg-dot" style="background:var(--cyan)"></div> Self</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div> Enemy</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--blue)"></div> Ally</div>
    </div>
    <div class="replay-canvas-wrap">
      <canvas id="replay-canvas"></canvas>
    </div>
    <div class="replay-info" id="replay-info"></div>
    <div class="replay-controls" id="replay-controls">
      <button class="replay-btn" id="btn-play">Play</button>
      <button class="replay-btn" id="btn-prev">&#9664;</button>
      <input type="range" class="replay-slider" id="replay-slider" min="0" max="0" value="0">
      <button class="replay-btn" id="btn-next">&#9654;</button>
      <span class="replay-tick-label" id="replay-tick-label">Step 0 / 0</span>
      <button class="replay-btn" id="btn-attention" style="margin-left:auto;">Attention</button>
    </div>
  </div>
</div>

<script>
// ─── State ───
const API = '';
let experiments = [];
let selectedExps = new Map(); // exp+phase -> {data, color, visible}
let activePanel = 'training';
let scenarioData = null;
let currentEpisode = null;
let filteredSteps = [];  // steps filtered by selected unit (or all)
let selectedUnit = null; // null = all units
let replayStep = 0;
let playing = false;
let playTimer = null;
let attentionData = null; // per-step attention weights
let showAttention = false;
let currentEpisodeIdx = null; // track which episode idx is loaded

const COLORS = [
  '#f5a623', '#34d399', '#67e8f9', '#c084fc', '#fb923c',
  '#f87171', '#60a5fa', '#a3e635', '#e879f9', '#fbbf24',
];
let colorIdx = 0;

// ─── Init ───
async function init() {
  const resp = await fetch(`${API}/api/experiments`);
  experiments = await resp.json();
  setupTabs();
  updateStatus();
  setInterval(() => { refreshActive(); lastRefresh = Date.now(); }, 30000);
  lastRefresh = Date.now();
  // Auto-load curriculum on start
  initCurriculumPanel();
}
let lastRefresh = Date.now();

function setupTabs() {
  document.querySelectorAll('.topbar-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.topbar-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.panels').forEach(p => p.classList.remove('active'));
      const panel = tab.dataset.panel;
      document.getElementById(`panel-${panel}`).classList.add('active');
      activePanel = panel;
      if (panel === 'scenarios') initScenarioPanel();
      if (panel === 'curriculum') initCurriculumPanel();
    });
  });
}

// ─── Training Panel ───
function renderExpList() {
  const list = document.getElementById('exp-list');
  list.innerHTML = '';
  experiments.forEach(exp => {
    const li = document.createElement('li');
    li.className = 'exp-item';
    const pills = exp.phases.map(p =>
      `<span class="phase-pill" data-exp="${exp.name}" data-phase="${p.name}">${p.name.replace('phase','P')}</span>`
    ).join('');
    li.innerHTML = `
      <span class="name">${exp.name.replace('impala_', '')}</span>
      <div class="phase-pills">${pills}</div>
    `;
    list.appendChild(li);
  });

  list.querySelectorAll('.phase-pill').forEach(pill => {
    pill.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleSeries(pill.dataset.exp, pill.dataset.phase, pill);
    });
  });
}

async function toggleSeries(exp, phase, pill) {
  const key = `${exp}/${phase}`;
  if (selectedExps.has(key)) {
    selectedExps.delete(key);
    pill.classList.remove('active');
  } else {
    const [training, logs] = await Promise.all([
      fetch(`${API}/api/training?exp=${exp}&phase=${phase}`).then(r => r.json()),
      fetch(`${API}/api/logs?exp=${exp}`).then(r => r.json()),
    ]);
    const color = COLORS[colorIdx++ % COLORS.length];
    const phaseEpochs = (logs.epochs || []).filter(e => e.phase === phase);
    selectedExps.set(key, { training, logs: phaseEpochs, color, visible: true, exp, phase });
    pill.classList.add('active');
  }
  renderCompareBar();
  renderCharts();
  renderStats();
}

function renderCompareBar() {
  const bar = document.getElementById('compare-bar');
  bar.innerHTML = '';
  selectedExps.forEach((val, key) => {
    const chip = document.createElement('div');
    chip.className = `compare-chip ${val.visible ? 'on' : ''}`;
    chip.innerHTML = `<span class="swatch" style="background:${val.color}"></span>${key.replace('impala_','')}`;
    chip.addEventListener('click', () => {
      val.visible = !val.visible;
      chip.classList.toggle('on');
      renderCharts();
    });
    bar.appendChild(chip);
  });
}

function renderStats() {
  const row = document.getElementById('stat-row');
  if (selectedExps.size === 0) {
    row.innerHTML = '';
    return;
  }
  // Show stats from the last selected experiment
  const last = [...selectedExps.values()].pop();
  const rows = last.training.rows || [];
  if (rows.length === 0) { row.innerHTML = ''; return; }

  const latest = rows[rows.length - 1];
  const bestWr = Math.max(...rows.map(r => r.win_rate));
  const lastEpoch = last.logs.filter(e => e.epoch > 0).slice(-1)[0];

  row.innerHTML = `
    <div class="stat-box ${bestWr > 0.35 ? 'good' : bestWr > 0.25 ? 'warn' : 'bad'}">
      <span class="label">Best Win Rate</span>
      <span class="value">${(bestWr * 100).toFixed(1)}%</span>
      <span class="sub">iter ${rows.find(r => r.win_rate === bestWr)?.iter}</span>
    </div>
    <div class="stat-box info">
      <span class="label">Current Win Rate</span>
      <span class="value">${(latest.win_rate * 100).toFixed(1)}%</span>
      <span class="sub">iter ${latest.iter}</span>
    </div>
    <div class="stat-box ${lastEpoch && lastEpoch.kl < 2 ? 'good' : 'warn'}">
      <span class="label">Last KL</span>
      <span class="value">${lastEpoch ? lastEpoch.kl.toFixed(2) : '—'}</span>
    </div>
    <div class="stat-box info">
      <span class="label">Entropy</span>
      <span class="value">${lastEpoch ? lastEpoch.ent.toFixed(2) : '—'}</span>
    </div>
    <div class="stat-box info">
      <span class="label">Iterations</span>
      <span class="value">${latest.iter}</span>
      <span class="sub">${latest.elapsed_s ? Math.round(latest.elapsed_s/60)+'m elapsed' : ''}</span>
    </div>
  `;

  // Check for eval results in logs
  const evals = last.logs.filter(e => e.type === 'eval');
  if (evals.length > 0) {
    const bestEval = Math.max(...evals.map(e => e.eval_win));
    row.innerHTML += `
      <div class="stat-box good">
        <span class="label">Best Eval</span>
        <span class="value">${(bestEval * 100).toFixed(1)}%</span>
        <span class="sub">iter ${evals.find(e => e.eval_win === bestEval)?.iter}</span>
      </div>
    `;
  }
}

function renderCharts() {
  const grid = document.getElementById('charts-grid');
  grid.innerHTML = '';

  const metrics = [
    { key: 'win_rate', label: 'Win Rate', fmt: v => (v*100).toFixed(1)+'%', color: '--green', wide: true },
    { key: 'entropy', label: 'Entropy', fmt: v => v.toFixed(2), color: '--purple' },
    { key: 'kl', label: 'KL Divergence (per epoch)', fmt: v => v.toFixed(2), color: '--red', fromLogs: true },
    { key: 'policy_loss', label: 'Policy Loss', fmt: v => v.toFixed(4), color: '--blue' },
    { key: 'value_loss', label: 'Value Loss', fmt: v => v.toFixed(4), color: '--amber' },
  ];

  metrics.forEach(m => {
    const card = document.createElement('div');
    card.className = `chart-card ${m.wide ? 'wide' : ''}`;
    card.innerHTML = `<div class="chart-title">${m.label}</div>`;
    const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svgEl.classList.add('chart-svg');
    card.appendChild(svgEl);
    grid.appendChild(card);

    const W = card.classList.contains('wide') ? 700 : 340;
    const H = 180;
    const margin = { top: 10, right: 20, bottom: 30, left: 50 };

    const svg = d3.select(svgEl)
      .attr('viewBox', `0 0 ${W} ${H}`)
      .attr('preserveAspectRatio', 'xMidYMid meet');

    const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);
    const w = W - margin.left - margin.right;
    const h = H - margin.top - margin.bottom;

    // Collect all visible series data
    let allPoints = [];
    selectedExps.forEach((val) => {
      if (!val.visible) return;
      if (m.fromLogs) {
        const pts = val.logs.filter(e => e.epoch > 0).map(e => ({
          x: e.iter + (e.epoch - 1) / e.max_epochs,
          y: e[m.key.replace('kl','kl')],
        })).filter(p => p.y !== undefined);
        allPoints.push(...pts);
      } else {
        const pts = (val.training.rows || []).map(r => ({ x: r.iter, y: r[m.key] }));
        allPoints.push(...pts);
      }
    });

    // Also add eval points for win_rate chart
    if (m.key === 'win_rate') {
      selectedExps.forEach((val) => {
        if (!val.visible) return;
        const evals = val.logs.filter(e => e.type === 'eval');
        allPoints.push(...evals.map(e => ({ x: e.iter, y: e.eval_win })));
      });
    }

    if (allPoints.length === 0) return;

    const xScale = d3.scaleLinear()
      .domain([d3.min(allPoints, d => d.x), d3.max(allPoints, d => d.x)])
      .range([0, w]);

    const yExtent = d3.extent(allPoints, d => d.y);
    const yPad = (yExtent[1] - yExtent[0]) * 0.1 || 0.01;
    const yScale = d3.scaleLinear()
      .domain([yExtent[0] - yPad, yExtent[1] + yPad])
      .range([h, 0]);

    // Grid
    g.append('g').attr('class', 'grid')
      .call(d3.axisLeft(yScale).ticks(4).tickSize(-w).tickFormat(''));

    // Axes
    g.append('g').attr('class', 'axis')
      .attr('transform', `translate(0,${h})`)
      .call(d3.axisBottom(xScale).ticks(Math.min(allPoints.length, 10)).tickFormat(d3.format('d')));

    g.append('g').attr('class', 'axis')
      .call(d3.axisLeft(yScale).ticks(4).tickFormat(m.fmt));

    // Lines
    const line = d3.line().x(d => xScale(d.x)).y(d => yScale(d.y)).curve(d3.curveMonotoneX);

    selectedExps.forEach((val) => {
      if (!val.visible) return;

      if (m.fromLogs) {
        const pts = val.logs.filter(e => e.epoch > 0).map(e => ({
          x: e.iter + (e.epoch - 1) / e.max_epochs,
          y: e[m.key],
        })).filter(p => p.y !== undefined);
        if (pts.length === 0) return;

        g.append('path')
          .datum(pts)
          .attr('fill', 'none')
          .attr('stroke', val.color)
          .attr('stroke-width', 1.5)
          .attr('stroke-opacity', 0.8)
          .attr('d', line);
      } else {
        const pts = (val.training.rows || []).map(r => ({ x: r.iter, y: r[m.key] }));
        if (pts.length === 0) return;

        g.append('path')
          .datum(pts)
          .attr('fill', 'none')
          .attr('stroke', val.color)
          .attr('stroke-width', 2)
          .attr('d', line);

        // Dots
        g.selectAll(null)
          .data(pts)
          .join('circle')
          .attr('cx', d => xScale(d.x))
          .attr('cy', d => yScale(d.y))
          .attr('r', 2.5)
          .attr('fill', val.color);
      }

      // Eval markers for win rate
      if (m.key === 'win_rate') {
        const evals = val.logs.filter(e => e.type === 'eval');
        evals.forEach(ev => {
          g.append('circle')
            .attr('cx', xScale(ev.iter))
            .attr('cy', yScale(ev.eval_win))
            .attr('r', 5)
            .attr('fill', 'none')
            .attr('stroke', val.color)
            .attr('stroke-width', 2)
            .attr('stroke-dasharray', '3 2');

          g.append('text')
            .attr('x', xScale(ev.iter))
            .attr('y', yScale(ev.eval_win) - 8)
            .attr('text-anchor', 'middle')
            .attr('fill', val.color)
            .attr('font-size', 9)
            .attr('font-family', 'var(--font-mono)')
            .text(`${(ev.eval_win*100).toFixed(1)}%`);
        });
      }
    });
  });
}

// ─── Scenario Panel ───
async function initScenarioPanel() {
  const expSel = document.getElementById('sc-exp-select');
  const phaseSel = document.getElementById('sc-phase-select');

  expSel.innerHTML = experiments.map(e =>
    `<option value="${e.name}">${e.name.replace('impala_','')}</option>`
  ).join('');

  function updatePhases() {
    const exp = experiments.find(e => e.name === expSel.value);
    if (!exp) return;
    phaseSel.innerHTML = exp.phases
      .filter(p => p.has_episodes)
      .map(p => `<option value="${p.name}">${p.name}</option>`)
      .join('');
  }

  expSel.addEventListener('change', () => { updatePhases(); loadScenarios(); });
  phaseSel.addEventListener('change', loadScenarios);
  document.getElementById('scenario-search').addEventListener('input', filterScenarios);

  updatePhases();
  await loadScenarios();
}

async function loadScenarios() {
  const exp = document.getElementById('sc-exp-select').value;
  const phase = document.getElementById('sc-phase-select').value;
  if (!exp || !phase) return;

  const resp = await fetch(`${API}/api/scenarios?exp=${exp}&phase=${phase}`);
  scenarioData = await resp.json();
  renderScenarioList(scenarioData.scenarios);
}

function renderScenarioList(scenarios) {
  const list = document.getElementById('scenario-list');
  list.innerHTML = '';
  scenarios.sort((a, b) => a.win_rate - b.win_rate).forEach(sc => {
    const item = document.createElement('div');
    item.className = 'scenario-item';
    const wr = sc.win_rate;
    const wrColor = wr >= 0.6 ? 'var(--green)' : wr >= 0.3 ? 'var(--amber)' : 'var(--red)';
    item.innerHTML = `
      <span class="sname" title="${sc.name}">${sc.name.replace('gen_','').replace(/_/g,' ')}</span>
      <span class="swr" style="color:${wrColor}">${(wr*100).toFixed(0)}%</span>
    `;
    item.addEventListener('click', () => {
      list.querySelectorAll('.scenario-item').forEach(i => i.classList.remove('selected'));
      item.classList.add('selected');
      loadEpisodesForScenario(sc.name);
    });
    list.appendChild(item);
  });
}

function filterScenarios() {
  if (!scenarioData) return;
  const q = document.getElementById('scenario-search').value.toLowerCase();
  const filtered = scenarioData.scenarios.filter(s => s.name.toLowerCase().includes(q));
  renderScenarioList(filtered);
}

async function loadEpisodesForScenario(scenarioName) {
  const exp = document.getElementById('sc-exp-select').value;
  const phase = document.getElementById('sc-phase-select').value;
  const resp = await fetch(`${API}/api/episodes?exp=${exp}&phase=${phase}&scenario=${scenarioName}&limit=50`);
  const data = await resp.json();

  document.getElementById('replay-scenario-name').textContent = scenarioName.replace('gen_','').replace(/_/g,' ');

  const picker = document.getElementById('episode-picker');
  picker.innerHTML = '';
  (data.episodes || []).forEach((ep, i) => {
    const chip = document.createElement('div');
    chip.className = `ep-chip ${ep.outcome}`;
    chip.textContent = `#${i+1} ${ep.outcome[0]} ${ep.ticks}t`;
    chip.addEventListener('click', () => {
      picker.querySelectorAll('.ep-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      loadFullEpisode(exp, phase, ep.idx);
    });
    picker.appendChild(chip);
  });

  // Auto-load first episode
  if (data.episodes && data.episodes.length > 0) {
    picker.children[0].classList.add('active');
    loadFullEpisode(exp, phase, data.episodes[0].idx);
  }
}

async function loadFullEpisode(exp, phase, idx) {
  const resp = await fetch(`${API}/api/episode?exp=${exp}&phase=${phase}&idx=${idx}`);
  currentEpisode = await resp.json();
  currentEpisodeIdx = idx;
  replayStep = 0;
  selectedUnit = null;
  attentionData = null;
  showAttention = false;
  document.getElementById('btn-attention').classList.remove('active');
  document.getElementById('btn-attention').textContent = 'Attention';
  stopPlayback();

  const header = document.getElementById('replay-header');
  const existing = header.querySelector('.outcome-badge');
  if (existing) existing.remove();
  const badge = document.createElement('span');
  badge.className = `outcome-badge ${currentEpisode.outcome}`;
  badge.textContent = currentEpisode.outcome;
  header.appendChild(badge);

  // Build unit picker
  const unitPicker = document.getElementById('unit-picker');
  // Keep the label span, remove the rest
  while (unitPicker.children.length > 1) unitPicker.removeChild(unitPicker.lastChild);

  const unitIds = [...new Set(currentEpisode.steps.map(s => s.unit_id))].sort((a, b) => a - b);

  // "All" chip
  const allChip = document.createElement('div');
  allChip.className = 'ep-chip active';
  allChip.textContent = 'All';
  allChip.addEventListener('click', () => selectUnit(null));
  unitPicker.appendChild(allChip);

  // Per-unit chips with ability names
  unitIds.forEach(uid => {
    const chip = document.createElement('div');
    chip.className = 'ep-chip';
    chip.dataset.unit = uid;
    const names = currentEpisode.unit_ability_names?.[String(uid)];
    const label = names ? `Unit ${uid} (${names[0] || '?'})` : `Unit ${uid}`;
    chip.textContent = label;
    chip.addEventListener('click', () => selectUnit(uid));
    unitPicker.appendChild(chip);
  });

  computeEpisodeBounds();
  applyUnitFilter();
  renderReplayFrame();
}

// Compute fixed viewport bounds across ALL steps so scale doesn't shift
let episodeBounds = null;
function computeEpisodeBounds() {
  if (!currentEpisode || !currentEpisode.steps.length) { episodeBounds = null; return; }
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const step of currentEpisode.steps) {
    for (const e of step.entities) {
      const x = e[5], y = e[6];
      if (x === 0 && y === 0) continue; // skip dead/missing
      minX = Math.min(minX, x); maxX = Math.max(maxX, x);
      minY = Math.min(minY, y); maxY = Math.max(maxY, y);
    }
  }
  episodeBounds = { minX, maxX, minY, maxY };
}

function selectUnit(uid) {
  selectedUnit = uid;
  const picker = document.getElementById('unit-picker');
  picker.querySelectorAll('.ep-chip').forEach(c => c.classList.remove('active'));
  if (uid === null) {
    picker.querySelector('.ep-chip').classList.add('active'); // "All" is first
  } else {
    picker.querySelectorAll('.ep-chip').forEach(c => {
      if (c.dataset.unit == uid) c.classList.add('active');
    });
  }
  applyUnitFilter();
  replayStep = 0;
  renderReplayFrame();
}

function applyUnitFilter() {
  if (!currentEpisode) { filteredSteps = []; return; }
  if (selectedUnit === null) {
    filteredSteps = currentEpisode.steps;
  } else {
    filteredSteps = currentEpisode.steps.filter(s => s.unit_id === selectedUnit);
  }
  const slider = document.getElementById('replay-slider');
  slider.max = Math.max(0, filteredSteps.length - 1);
  slider.value = 0;
}

// ─── Replay Renderer ───
const ENTITY_COLORS = {
  0: '#67e8f9', // self - cyan
  1: '#f87171', // enemy - red
  2: '#60a5fa', // ally - blue
};

const MOVE_DIRS = [
  [0, -1],  // 0: N
  [1, -1],  // 1: NE
  [1, 0],   // 2: E
  [1, 1],   // 3: SE
  [0, 1],   // 4: S
  [-1, 1],  // 5: SW
  [-1, 0],  // 6: W
  [-1, -1], // 7: NW
  [0, 0],   // 8: stay
];

const COMBAT_NAMES = ['attack', 'hold', 'ability0', 'ability1', 'ability2', 'ability3', 'ability4', 'ability5', 'ability6', 'ability7'];

function renderReplayFrame() {
  if (!currentEpisode || filteredSteps.length === 0) return;

  const canvas = document.getElementById('replay-canvas');
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width;
  const H = rect.height;

  ctx.fillStyle = '#0a0c10';
  ctx.fillRect(0, 0, W, H);

  // Draw grid
  ctx.strokeStyle = '#1a1e28';
  ctx.lineWidth = 0.5;
  const gridSize = 40;
  for (let x = 0; x < W; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  const step = filteredSteps[replayStep];
  if (!step) return;

  const nextStep = filteredSteps[replayStep + 1];
  const t = playing ? lerpT : 0; // only lerp during playback

  // Lerp entity positions between current and next step
  const entities = step.entities.map((e, j) => {
    if (!nextStep || j >= nextStep.entities.length) return e;
    const ne = nextStep.entities[j];
    const lerped = [...e];
    lerped[5] = e[5] + (ne[5] - e[5]) * t; // pos_x
    lerped[6] = e[6] + (ne[6] - e[6]) * t; // pos_y
    lerped[0] = e[0] + (ne[0] - e[0]) * t; // hp
    return lerped;
  });
  const types = step.entity_types;
  const pad = 60;
  const areaW = W - 2 * pad;
  const areaH = H - 2 * pad;

  // Use fixed bounds across entire episode so scale is stable
  let minX, maxX, minY, maxY;
  if (episodeBounds) {
    ({ minX, maxX, minY, maxY } = episodeBounds);
  } else {
    // Fallback: compute from current frame
    minX = Infinity; maxX = -Infinity; minY = Infinity; maxY = -Infinity;
    entities.forEach(e => {
      const x = e[5], y = e[6];
      minX = Math.min(minX, x); maxX = Math.max(maxX, x);
      minY = Math.min(minY, y); maxY = Math.max(maxY, y);
    });
  }

  const rangeX = Math.max(maxX - minX, 0.05);
  const rangeY = Math.max(maxY - minY, 0.05);
  const datapad = 0.15;

  function toScreen(fx, fy) {
    const nx = (fx - minX + rangeX * datapad) / (rangeX * (1 + 2 * datapad));
    const ny = (fy - minY + rangeY * datapad) / (rangeY * (1 + 2 * datapad));
    return [pad + nx * areaW, pad + ny * areaH];
  }

  // Draw trails from previous steps
  const trailLen = Math.min(replayStep, 8);
  for (let t = Math.max(0, replayStep - trailLen); t < replayStep; t++) {
    const prevStep = filteredSteps[t];
    if (!prevStep) continue;
    const alpha = 0.1 + 0.15 * ((t - (replayStep - trailLen)) / trailLen);
    prevStep.entities.forEach((e, j) => {
      if (j >= types.length) return;
      const [sx, sy] = toScreen(e[5], e[6]);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = ENTITY_COLORS[types[j]] || '#666';
      ctx.beginPath();
      ctx.arc(sx, sy, 4, 0, Math.PI * 2);
      ctx.fill();
    });
  }
  ctx.globalAlpha = 1;

  // ── Entity feature indices ──
  // [0] hp_pct, [5] pos_x/20, [6] pos_y/20, [7] dist_from_caster/10
  // [12] auto_dps/30, [13] attack_range/10, [14] atk_cd_pct
  // [15] ability_dmg/50, [16] ability_range/10, [17] ability_cd_pct
  // [18] heal_amt/50, [19] heal_range/10, [20] heal_cd_pct
  // [21] ctrl_range/10, [22] ctrl_dur/2000, [23] ctrl_cd_pct
  // [24] is_casting, [25] cast_progress, [26] cc_remaining/2000, [27] move_speed/5

  // Helper: convert range feature (range/10) to screen pixels
  // Positions are pos/20, range is range/10 => range in pos-space = feat * 10 / 20 = feat * 0.5
  function rangeToScreen(rangeFeat) {
    if (rangeFeat <= 0) return 0;
    const rangePosSpace = rangeFeat * 0.5;
    // Scale same as positions: rangePosSpace / (rangeX * (1 + 2*datapad)) * areaW
    return rangePosSpace / (rangeX * (1 + 2 * datapad)) * areaW;
  }

  const selfEnt = entities[0];
  const [selfSx, selfSy] = toScreen(selfEnt[5], selfEnt[6]);

  // ── Draw range circles for active unit (self = entity[0]) ──
  const atkRange = rangeToScreen(selfEnt[13]);
  const abilRange = rangeToScreen(selfEnt[16]);
  const healRange = rangeToScreen(selfEnt[19]);

  // Attack range — white dashed
  if (atkRange > 5) {
    ctx.strokeStyle = '#ffffff22';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 6]);
    ctx.beginPath();
    ctx.arc(selfSx, selfSy, atkRange, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    // Label
    ctx.fillStyle = '#ffffff33';
    ctx.font = '500 8px "JetBrains Mono"';
    ctx.textAlign = 'left';
    ctx.fillText('ATK', selfSx + atkRange + 3, selfSy - 2);
  }

  // Ability range — amber dashed (only if different from attack)
  if (abilRange > 5 && Math.abs(abilRange - atkRange) > 10) {
    ctx.strokeStyle = '#f5a62333';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 5]);
    ctx.beginPath();
    ctx.arc(selfSx, selfSy, abilRange, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#f5a62344';
    ctx.font = '500 8px "JetBrains Mono"';
    ctx.textAlign = 'left';
    ctx.fillText('ABIL', selfSx + abilRange + 3, selfSy + 8);
  }

  // Heal range — green dashed
  if (healRange > 5) {
    ctx.strokeStyle = '#34d39922';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 5]);
    ctx.beginPath();
    ctx.arc(selfSx, selfSy, healRange, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#34d39933';
    ctx.font = '500 8px "JetBrains Mono"';
    ctx.textAlign = 'left';
    ctx.fillText('HEAL', selfSx + healRange + 3, selfSy + 18);
  }

  // ── Determine target entity for highlighting ──
  let targetEntIdx = null;
  if (step.target_idx != null && step.target_idx < entities.length) {
    targetEntIdx = step.target_idx;
  }

  // ── Draw current entities ──
  entities.forEach((e, j) => {
    if (j >= types.length) return;
    const color = ENTITY_COLORS[types[j]] || '#666';
    const [sx, sy] = toScreen(e[5], e[6]);
    const hp = e[0]; // hp_pct
    const isActive = (j === 0); // self is always index 0
    const isTarget = (j === targetEntIdx);
    const radius = isActive ? 20 : 16;

    // Glow
    const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, radius * 2.5);
    grad.addColorStop(0, color + (isTarget ? '55' : '33'));
    grad.addColorStop(1, color + '00');
    ctx.fillStyle = grad;
    ctx.fillRect(sx - radius * 3, sy - radius * 3, radius * 6, radius * 6);

    // Body
    ctx.fillStyle = color + (isActive ? 'cc' : '88');
    ctx.strokeStyle = color;
    ctx.lineWidth = isActive ? 2.5 : 1.5;
    ctx.beginPath();
    ctx.arc(sx, sy, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // HP arc
    if (hp > 0) {
      const hpColor = hp > 0.5 ? '#34d399' : hp > 0.25 ? '#f5a623' : '#f87171';
      ctx.strokeStyle = hpColor;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(sx, sy, radius + 4, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * hp);
      ctx.stroke();
    }

    // Target reticle (animated feel with double ring)
    if (isTarget) {
      ctx.strokeStyle = '#f87171';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(sx, sy, radius + 10, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = '#f8717166';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(sx, sy, radius + 16, 0, Math.PI * 2);
      ctx.stroke();
      // "TARGET" label
      ctx.fillStyle = '#f87171';
      ctx.font = '700 9px "JetBrains Mono"';
      ctx.textAlign = 'center';
      ctx.fillText('TARGET', sx, sy - radius - 20);
    }

    // Entity type + index label
    ctx.fillStyle = '#e8ecf4';
    ctx.font = '600 9px "JetBrains Mono"';
    ctx.textAlign = 'center';
    const typeLabel = types[j] === 0 ? 'SELF' : types[j] === 1 ? 'ENM' : 'ALY';
    ctx.fillText(`${typeLabel}[${j}]`, sx, sy + 2);

    // Stats below: HP + key combat stat
    ctx.fillStyle = '#a0a8be';
    ctx.font = '500 9px "JetBrains Mono"';
    const hpText = `${(hp * 100).toFixed(0)}%`;
    const atkRng = (e[13] * 10).toFixed(0);
    const dps = (e[12] * 30).toFixed(0);
    ctx.fillText(`${hpText} rng:${atkRng} dps:${dps}`, sx, sy + radius + 16);

    // Cooldown indicators
    const atkCd = e[14]; // 0=ready, 1=full CD
    const abilCd = e[17];
    if (isActive) {
      ctx.font = '500 8px "JetBrains Mono"';
      const cdTexts = [];
      if (atkCd < 0.01) cdTexts.push('atk:RDY');
      else cdTexts.push(`atk:${(atkCd * 100).toFixed(0)}%cd`);
      if (selfEnt[15] > 0) { // has ability damage
        if (abilCd < 0.01) cdTexts.push('abil:RDY');
        else cdTexts.push(`abil:${(abilCd * 100).toFixed(0)}%cd`);
      }
      ctx.fillStyle = '#6b739488';
      ctx.fillText(cdTexts.join(' '), sx, sy + radius + 27);
    }
  });

  // ── Draw move direction arrow for active unit ──
  if (step.move_dir !== null && step.move_dir !== undefined && step.move_dir < 8) {
    const [dx, dy] = MOVE_DIRS[step.move_dir];
    const arrowLen = 35;
    const ex = selfSx + dx * arrowLen;
    const ey = selfSy + dy * arrowLen;

    ctx.strokeStyle = '#67e8f9';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    ctx.moveTo(selfSx, selfSy);
    ctx.lineTo(ex, ey);
    ctx.stroke();
    ctx.setLineDash([]);

    // Arrowhead
    const angle = Math.atan2(dy, dx);
    ctx.fillStyle = '#67e8f9';
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex - 8 * Math.cos(angle - 0.4), ey - 8 * Math.sin(angle - 0.4));
    ctx.lineTo(ex - 8 * Math.cos(angle + 0.4), ey - 8 * Math.sin(angle + 0.4));
    ctx.closePath();
    ctx.fill();
  }

  // ── Draw target line ──
  if (targetEntIdx !== null) {
    const target = entities[targetEntIdx];
    if (target) {
      const [tx, ty] = toScreen(target[5], target[6]);
      // Distance label
      const dist = Math.sqrt((selfEnt[5] - target[5]) ** 2 + (selfEnt[6] - target[6]) ** 2) * 20;
      const midX = (selfSx + tx) / 2;
      const midY = (selfSy + ty) / 2;

      ctx.strokeStyle = '#f8717155';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.moveTo(selfSx, selfSy);
      ctx.lineTo(tx, ty);
      ctx.stroke();
      ctx.setLineDash([]);

      // Distance on the line
      ctx.fillStyle = '#f8717199';
      ctx.font = '600 9px "JetBrains Mono"';
      ctx.textAlign = 'center';
      ctx.fillText(`d=${dist.toFixed(1)}`, midX, midY - 6);
    }
  }

  // ── Attention / analysis overlay ──
  if (showAttention && attentionData) {
    const origStep = filteredSteps[replayStep];
    const attnStep = attentionData.find(a => a.tick === origStep.tick && a.unit_id === origStep.unit_id);
    if (attnStep) {
      // Draw entity analysis: in-range indicators + distance labels
      if (attnStep.entities) {
        attnStep.entities.forEach(ed => {
          if (ed.idx === 0 || ed.idx >= entities.length) return;
          const [ex, ey] = toScreen(entities[ed.idx][5], entities[ed.idx][6]);

          // In-range indicator for enemies
          if (ed.type === 'enemy') {
            if (ed.in_range) {
              // Green ring = in range
              ctx.strokeStyle = '#34d39966';
              ctx.lineWidth = 2;
              ctx.setLineDash([3, 3]);
              ctx.beginPath();
              ctx.arc(ex, ey, 30, 0, Math.PI * 2);
              ctx.stroke();
              ctx.setLineDash([]);
              ctx.fillStyle = '#34d399';
              ctx.font = '600 8px "JetBrains Mono"';
              ctx.textAlign = 'center';
              ctx.fillText('IN RNG', ex, ey + 34);
            } else {
              // Red = out of range
              ctx.fillStyle = '#f8717166';
              ctx.font = '600 8px "JetBrains Mono"';
              ctx.textAlign = 'center';
              ctx.fillText(`OUT (${ed.dist.toFixed(1)})`, ex, ey + 34);
            }
          }
        });
      }

      // Action confidence overlay — top-right corner
      ctx.fillStyle = '#c084fccc';
      ctx.font = '600 10px "JetBrains Mono"';
      ctx.textAlign = 'right';
      let oy = 20;

      ctx.fillText('Action Confidence:', W - 12, oy);
      oy += 15;

      if (attnStep.move_prob != null) {
        const conf = attnStep.move_prob;
        const bar = Math.round(conf * 20);
        const label = attnStep.move_dir === 8 ? 'stay' : ['N','NE','E','SE','S','SW','W','NW'][attnStep.move_dir];
        ctx.fillStyle = conf > 0.5 ? '#34d399' : conf > 0.2 ? '#f5a623' : '#f87171';
        ctx.fillText(`move(${label}): ${'█'.repeat(bar)}${'░'.repeat(20-bar)} ${(conf*100).toFixed(0)}%`, W - 12, oy);
        oy += 14;
      }

      if (attnStep.combat_prob != null) {
        const conf = attnStep.combat_prob;
        const bar = Math.round(conf * 20);
        const cname = COMBAT_NAMES[attnStep.combat_type] || '?';
        ctx.fillStyle = conf > 0.5 ? '#34d399' : conf > 0.2 ? '#f5a623' : '#f87171';
        ctx.fillText(`combat(${cname}): ${'█'.repeat(bar)}${'░'.repeat(20-bar)} ${(conf*100).toFixed(0)}%`, W - 12, oy);
        oy += 14;
      }

      if (attnStep.target_prob != null) {
        const conf = attnStep.target_prob;
        const bar = Math.round(conf * 20);
        ctx.fillStyle = conf > 0.5 ? '#34d399' : conf > 0.2 ? '#f5a623' : '#f87171';
        ctx.fillText(`target(e${attnStep.target_idx}): ${'█'.repeat(bar)}${'░'.repeat(20-bar)} ${(conf*100).toFixed(0)}%`, W - 12, oy);
        oy += 14;
      }

      // Action mask visualization
      if (attnStep.mask) {
        oy += 6;
        ctx.fillStyle = '#6b739488';
        ctx.font = '500 9px "JetBrains Mono"';
        const maskLabels = ['atk_nr','atk_wk','atk_fo','mv_twd','mv_awy','hold','ab0','ab1','ab2','ab3','ab4','ab5','ab6','ab7'];
        const enabled = attnStep.mask.map((m, i) => m ? maskLabels[i] || `a${i}` : null).filter(Boolean);
        ctx.fillText(`mask: ${enabled.join(' ')}`, W - 12, oy);
      }
    }
  }

  // Update step info
  renderStepInfo(step);
  const unitLabel = selectedUnit !== null ? ` [unit ${selectedUnit}]` : '';
  document.getElementById('replay-tick-label').textContent =
    `Step ${replayStep + 1} / ${filteredSteps.length} (tick ${step.tick})${unitLabel}`;
  document.getElementById('replay-slider').value = replayStep;
}

function renderStepInfo(step) {
  const info = document.getElementById('replay-info');
  const combatName = step.combat_type !== null ? (COMBAT_NAMES[step.combat_type] || `?${step.combat_type}`) : '—';
  const moveDir = step.move_dir !== null ? (step.move_dir === 8 ? 'stay' : ['N','NE','E','SE','S','SW','W','NW'][step.move_dir]) : '—';

  // Get ability names
  const unitAbilities = currentEpisode.unit_ability_names?.[String(step.unit_id)] || [];
  let abilityLabel = combatName;
  if (step.combat_type >= 2 && unitAbilities[step.combat_type - 2]) {
    abilityLabel = unitAbilities[step.combat_type - 2];
  }

  // Target description
  let targetDesc = '—';
  if (step.target_idx != null && step.target_idx < step.entities.length) {
    const ttype = step.entity_types[step.target_idx];
    const tlabel = ttype === 0 ? 'self' : ttype === 1 ? 'enemy' : 'ally';
    const thp = (step.entities[step.target_idx][0] * 100).toFixed(0);
    targetDesc = `${tlabel}[${step.target_idx}] ${thp}%hp`;
  }

  // Ability list for this unit
  const abilListHtml = unitAbilities.length > 0
    ? unitAbilities.map((name, i) => {
        const isUsed = step.combat_type === i + 2;
        return `<span style="color:${isUsed ? 'var(--amber)' : 'var(--text-2)'};font-weight:${isUsed ? '700' : '400'}">${name}</span>`;
      }).join(' · ')
    : '';

  info.innerHTML = `
    <div class="step-info-grid">
      <div class="step-info-item"><span class="si-label">Unit</span><span class="si-value">${step.unit_id}</span></div>
      <div class="step-info-item"><span class="si-label">Move</span><span class="si-value">${moveDir}</span></div>
      <div class="step-info-item"><span class="si-label">Combat</span><span class="si-value" style="color:var(--amber)">${abilityLabel}</span></div>
      <div class="step-info-item"><span class="si-label">Target</span><span class="si-value">${targetDesc}</span></div>
      <div class="step-info-item"><span class="si-label">Reward</span><span class="si-value" style="color:${step.step_reward >= 0 ? 'var(--green)' : 'var(--red)'}">${step.step_reward?.toFixed(3) ?? '—'}</span></div>
      <div class="step-info-item"><span class="si-label">LogP(m)</span><span class="si-value">${step.lp_move?.toFixed(2) ?? '—'}</span></div>
      <div class="step-info-item"><span class="si-label">LogP(c)</span><span class="si-value">${step.lp_combat?.toFixed(2) ?? '—'}</span></div>
      <div class="step-info-item"><span class="si-label">LogP(ptr)</span><span class="si-value">${step.lp_pointer?.toFixed(2) ?? '—'}</span></div>
    </div>
    ${abilListHtml ? `<div style="font-family:var(--font-mono);font-size:10px;margin-top:4px;">Abilities: ${abilListHtml}</div>` : ''}
  `;
}

// ─── Playback Controls ───
document.getElementById('btn-play').addEventListener('click', togglePlayback);
document.getElementById('btn-prev').addEventListener('click', () => { if (replayStep > 0) { replayStep--; renderReplayFrame(); } });
document.getElementById('btn-next').addEventListener('click', () => {
  if (filteredSteps.length && replayStep < filteredSteps.length - 1) { replayStep++; renderReplayFrame(); }
});
document.getElementById('replay-slider').addEventListener('input', (e) => {
  replayStep = parseInt(e.target.value);
  renderReplayFrame();
});

// ─── Attention button ───
document.getElementById('btn-attention').addEventListener('click', async () => {
  if (!currentEpisode || currentEpisodeIdx === null) return;
  const btn = document.getElementById('btn-attention');

  if (showAttention) {
    showAttention = false;
    btn.classList.remove('active');
    btn.textContent = 'Attention';
    renderReplayFrame();
    return;
  }

  if (!attentionData) {
    btn.textContent = 'Loading...';
    btn.disabled = true;
    const exp = document.getElementById('sc-exp-select').value;
    const phase = document.getElementById('sc-phase-select').value;
    try {
      const resp = await fetch(`${API}/api/attention?exp=${exp}&phase=${phase}&idx=${currentEpisodeIdx}`);
      const data = await resp.json();
      if (data.error) {
        btn.textContent = 'Error';
        console.error('Attention error:', data.error);
        setTimeout(() => { btn.textContent = 'Attention'; btn.disabled = false; }, 2000);
        return;
      }
      attentionData = data;
    } catch(e) {
      btn.textContent = 'Error';
      console.error('Attention fetch error:', e);
      setTimeout(() => { btn.textContent = 'Attention'; btn.disabled = false; }, 2000);
      return;
    }
    btn.disabled = false;
  }

  showAttention = true;
  btn.classList.add('active');
  btn.textContent = 'Attn ON';
  renderReplayFrame();
});

// ─── Lerp playback ───
let lerpT = 0; // 0..1 interpolation between replayStep and replayStep+1
let lastFrameTime = 0;
const LERP_DURATION = 400; // ms per step transition

function togglePlayback() {
  if (playing) {
    stopPlayback();
  } else {
    playing = true;
    lerpT = 0;
    lastFrameTime = performance.now();
    document.getElementById('btn-play').textContent = 'Pause';
    document.getElementById('btn-play').classList.add('active');
    requestAnimationFrame(playbackLoop);
  }
}

function playbackLoop(now) {
  if (!playing) return;
  const dt = now - lastFrameTime;
  lastFrameTime = now;

  lerpT += dt / LERP_DURATION;
  if (lerpT >= 1) {
    lerpT = 0;
    replayStep++;
    if (replayStep >= filteredSteps.length - 1) {
      replayStep = filteredSteps.length - 1;
      stopPlayback();
      renderReplayFrame();
      return;
    }
  }
  renderReplayFrame();
  requestAnimationFrame(playbackLoop);
}

function stopPlayback() {
  playing = false;
  lerpT = 0;
  document.getElementById('btn-play').textContent = 'Play';
  document.getElementById('btn-play').classList.remove('active');
}

// ─── Refresh ───
async function refreshActive() {
  // Re-fetch data for all selected experiments (training panel)
  for (const [key, val] of selectedExps) {
    const [exp, phase] = key.split('/');
    const [training, logs] = await Promise.all([
      fetch(`${API}/api/training?exp=${exp}&phase=${phase}`).then(r => r.json()),
      fetch(`${API}/api/logs?exp=${exp}`).then(r => r.json()),
    ]);
    val.training = training;
    val.logs = (logs.epochs || []).filter(e => e.phase === phase);
  }
  renderCharts();
  renderStats();

  // Refresh curriculum panel if active
  if (activePanel === 'curriculum' && curriculumData) {
    loadCurriculum(curriculumData.experiment);
  }
}

function updateStatus() {
  const el = document.getElementById('status-text');
  const now = new Date();
  const secLeft = Math.max(0, Math.ceil(30 - (Date.now() - lastRefresh) / 1000));
  el.innerHTML = `<span class="live">&#9679;</span> ${now.toLocaleTimeString()} // refresh in ${secLeft}s`;
}
setInterval(updateStatus, 1000);

// ─── Resize handler ───

});

// ─── Keyboard shortcuts ───
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') { if (replayStep > 0) { replayStep--; renderReplayFrame(); } }
  if (e.key === 'ArrowRight') {
    if (filteredSteps.length && replayStep < filteredSteps.length - 1) { replayStep++; renderReplayFrame(); }
  }
  if (e.key === ' ') { e.preventDefault(); togglePlayback(); }
});

// ─── Curriculum Panel ───
let curriculumData = null;

async function initCurriculumPanel() {
  // Auto-select the latest curriculum experiment
  const currExps = experiments.filter(e => e.name.startsWith('curriculum_'));
  if (!currExps.length) {
    document.getElementById('curriculum-overview').innerHTML =
      '<div style="color:var(--text-2);padding:20px;">No curriculum experiments found.</div>';
    return;
  }
  loadCurriculum(currExps[currExps.length - 1].name);
}

async function loadCurriculum(expName) {
  const resp = await fetch(`${API}/api/curriculum?exp=${expName}`);
  curriculumData = await resp.json();
  renderCurriculumOverview();
  renderCurriculumChart();
}

function renderCurriculumOverview() {
  const container = document.getElementById('curriculum-overview');
  if (!curriculumData || !curriculumData.drills) {
    container.innerHTML = '<div style="color:var(--text-2)">No data</div>';
    return;
  }

  const drills = curriculumData.drills;
  const phases = {};
  drills.forEach(d => {
    if (!phases[d.phase]) phases[d.phase] = [];
    phases[d.phase].push(d);
  });

  const phaseNames = {1:'Movement',2:'Spatial',3:'Targeting',4:'Abilities',5:'Coordination'};

  let html = '<div style="display:flex;flex-wrap:wrap;gap:8px;">';
  for (const [phase, pDrills] of Object.entries(phases).sort((a,b) => a[0]-b[0])) {
    html += `<div style="background:var(--bg-2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;min-width:180px;">`;
    html += `<div style="font-family:var(--font-mono);font-size:11px;color:var(--text-2);margin-bottom:6px;">Phase ${phase}: ${phaseNames[phase]||''}</div>`;
    pDrills.forEach(d => {
      const pct = Math.round(d.best_win_rate * 100);
      const color = d.passed ? 'var(--green)' : d.n_iters > 0 ? 'var(--amber)' : 'var(--text-2)';
      const icon = d.passed ? '&#10003;' : d.n_iters > 0 ? '&#9658;' : '&#9675;';
      const shortName = d.name.replace(/^\d+\.\d+[b]?_/, '');
      const isSelected = d.name === inspectedDrill;
      const bgStyle = isSelected ? 'background:var(--bg-3);border-radius:3px;margin:0 -4px;padding:2px 4px;' : 'padding:2px 0;';
      html += `<div style="display:flex;align-items:center;gap:6px;cursor:pointer;${bgStyle}" onclick="showDrillDetail('${d.name}')">`;
      html += `<span style="color:${color};font-size:12px;width:14px;text-align:center;">${icon}</span>`;
      html += `<span style="font-family:var(--font-mono);font-size:12px;flex:1;${isSelected ? 'color:var(--amber);font-weight:600;' : ''}">${shortName}</span>`;
      if (d.n_iters > 0) {
        html += `<span style="font-family:var(--font-mono);font-size:11px;color:${color};">${pct}%</span>`;
        html += `<span style="font-family:var(--font-mono);font-size:10px;color:var(--text-2);">${d.n_iters}it</span>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  }
  html += '</div>';
  container.innerHTML = html;
}

// Track which drills are visible in the combined chart
let visibleDrills = new Set(); // empty = show all
let inspectedDrill = null; // currently selected drill for detail view

function renderCurriculumChart() {
  const container = document.getElementById('curriculum-chart');
  if (!curriculumData || !curriculumData.drills) {
    container.innerHTML = '';
    return;
  }

  const allDrills = curriculumData.drills.filter(d => d.rows && d.rows.length > 0);
  if (!allDrills.length) {
    container.innerHTML = '<div style="color:var(--text-2);padding:8px;">No training data yet.</div>';
    return;
  }

  // If no drills explicitly toggled, show all
  const showAll = visibleDrills.size === 0;
  const activeDrills = showAll ? allDrills : allDrills.filter(d => visibleDrills.has(d.name));
  const lineColors = ['#f5a623','#34d399','#67e8f9','#c084fc','#fb923c','#f87171','#60a5fa','#a3e635','#e879f9','#fbbf24'];

  container.innerHTML = '';

  // Toggle buttons
  const toggleBar = document.createElement('div');
  toggleBar.style.cssText = 'display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;';
  allDrills.forEach((drill, di) => {
    const color = lineColors[di % lineColors.length];
    const isActive = showAll || visibleDrills.has(drill.name);
    const btn = document.createElement('button');
    const shortName = drill.name.replace(/^\d+\.\d+[b]?_/, '');
    btn.textContent = shortName;
    btn.style.cssText = `font-family:var(--font-mono);font-size:10px;padding:2px 8px;border-radius:3px;cursor:pointer;border:1px solid ${color};background:${isActive ? color + '33' : 'transparent'};color:${isActive ? color : 'var(--text-2)'};`;
    btn.onclick = () => {
      if (visibleDrills.has(drill.name)) {
        visibleDrills.delete(drill.name);
      } else {
        visibleDrills.add(drill.name);
      }
      renderCurriculumChart();
    };
    toggleBar.appendChild(btn);
  });
  // "All" button
  const allBtn = document.createElement('button');
  allBtn.textContent = 'All';
  allBtn.style.cssText = `font-family:var(--font-mono);font-size:10px;padding:2px 8px;border-radius:3px;cursor:pointer;border:1px solid var(--text-2);background:${showAll ? 'var(--text-2)33' : 'transparent'};color:var(--text-2);`;
  allBtn.onclick = () => { visibleDrills.clear(); renderCurriculumChart(); };
  toggleBar.appendChild(allBtn);
  container.appendChild(toggleBar);

  if (!activeDrills.length) return;

  const W = 900, H = 300, M = {top:20,right:140,bottom:30,left:50};
  const w = W - M.left - M.right, h = H - M.top - M.bottom;

  const svg = d3.select(container)
    .append('svg').attr('viewBox', `0 0 ${W} ${H}`).style('width','100%');

  const g = svg.append('g').attr('transform', `translate(${M.left},${M.top})`);

  // Compute global iteration offset per drill (sequential x-axis)
  let globalOffset = 0;
  const drillOffsets = [];
  activeDrills.forEach(d => {
    drillOffsets.push({name: d.name, offset: globalOffset, n: d.rows.length});
    globalOffset += d.rows.length;
  });

  const xScale = d3.scaleLinear().domain([0, Math.max(globalOffset, 1)]).range([0, w]);
  const yScale = d3.scaleLinear().domain([0, 1]).range([h, 0]);

  // Grid
  g.append('g').call(d3.axisLeft(yScale).ticks(5).tickFormat(d3.format('.0%')))
    .attr('class', 'axis');
  g.append('g').attr('transform', `translate(0,${h})`).call(d3.axisBottom(xScale).ticks(10))
    .attr('class', 'axis');

  // Vertical lines at drill boundaries
  drillOffsets.forEach((d, i) => {
    if (i > 0) {
      g.append('line')
        .attr('x1', xScale(d.offset)).attr('x2', xScale(d.offset))
        .attr('y1', 0).attr('y2', h)
        .attr('stroke', 'var(--border-bright)').attr('stroke-dasharray', '3,3');
    }
    g.append('text')
      .attr('x', xScale(d.offset + d.n / 2)).attr('y', -6)
      .attr('text-anchor', 'middle')
      .attr('font-size', '9px').attr('fill', 'var(--text-2)')
      .attr('font-family', 'var(--font-mono)')
      .text(d.name.replace(/^\d+\.\d+[b]?_/, '').slice(0, 14));
  });

  // 100% pass line
  g.append('line').attr('x1',0).attr('x2',w).attr('y1',yScale(1)).attr('y2',yScale(1))
    .attr('stroke','var(--green-dim)').attr('stroke-dasharray','4,2');

  // Plot win rate for each drill (with 0% start point)
  activeDrills.forEach((drill, di) => {
    const allIdx = allDrills.indexOf(drill);
    const off = drillOffsets[di].offset;
    const color = lineColors[allIdx % lineColors.length];
    const isInspected = drill.name === inspectedDrill;

    // Prepend a 0% point at the drill start
    const dataWithStart = [{win_rate: 0}, ...drill.rows];
    const line = d3.line()
      .x((d, i) => xScale(off + i))
      .y(d => yScale(d.win_rate || 0));

    // Highlight background for inspected drill
    if (isInspected) {
      g.append('rect')
        .attr('x', xScale(off))
        .attr('y', 0)
        .attr('width', xScale(off + drill.rows.length) - xScale(off))
        .attr('height', h)
        .attr('fill', color)
        .attr('opacity', 0.08);
    }

    g.append('path')
      .datum(dataWithStart)
      .attr('fill', 'none')
      .attr('stroke', color)
      .attr('stroke-width', isInspected ? 3 : 1.5)
      .attr('stroke-opacity', isInspected ? 1 : 0.7)
      .attr('d', line);

    // Pass marker — green checkmark at the iteration where drill passed
    if (drill.passed && drill.passed_iter) {
      const px = xScale(off + drill.passed_iter);
      const lastWr = drill.rows[drill.rows.length - 1]?.win_rate || 0;
      const py = yScale(lastWr);
      g.append('text')
        .attr('x', px).attr('y', py - 8)
        .attr('text-anchor', 'middle')
        .attr('font-size', '14px').attr('fill', 'var(--green)')
        .text('\u2713');
    }
  });

  // Legend
  const legend = svg.append('g').attr('transform', `translate(${W - M.right + 10}, ${M.top})`);
  activeDrills.forEach((drill, di) => {
    const allIdx = allDrills.indexOf(drill);
    const color = lineColors[allIdx % lineColors.length];
    const passed = drill.passed;
    const gy = legend.append('g').attr('transform', `translate(0,${di * 16})`)
      .style('cursor', 'pointer')
      .on('click', () => showDrillDetail(drill.name));
    gy.append('rect').attr('width',10).attr('height',3).attr('y',4).attr('fill',color);
    gy.append('text').attr('x',14).attr('y',9).attr('font-size','10px')
      .attr('fill','var(--text-1)').attr('font-family','var(--font-mono)')
      .text((passed ? '\u2713 ' : '') + drill.name.replace(/^\d+\.\d+[b]?_/, '').slice(0,15));
  });
}

function showDrillDetail(drillName) {
  inspectedDrill = drillName;
  renderCurriculumChart(); // re-render to update highlight
  const container = document.getElementById('curriculum-drill-detail');
  if (!curriculumData) return;
  const drill = curriculumData.drills.find(d => d.name === drillName);
  if (!drill || !drill.rows || !drill.rows.length) {
    container.innerHTML = `<div style="color:var(--text-2);padding:8px;">No data for ${drillName}</div>`;
    return;
  }

  const W = 700, H = 250, M = {top:20,right:80,bottom:30,left:50};
  const w = W - M.left - M.right, h = H - M.top - M.bottom;

  const rows = drill.rows;
  const lastRow = rows[rows.length - 1];
  const totalSteps = rows.reduce((s, r) => s + (r.n_steps || 0), 0);
  const totalEps = rows.reduce((s, r) => s + (r.n_episodes || 0), 0);
  const totalElapsed = lastRow.elapsed_s || 0;
  const avgGenTime = rows.reduce((s, r) => s + (r.gen_time || 0), 0) / rows.length;
  const avgTrainTime = rows.reduce((s, r) => s + (r.train_time || 0), 0) / rows.length;
  const stepsPerSec = totalElapsed > 0 ? (totalSteps / totalElapsed).toFixed(0) : '—';

  let html = `<div style="font-family:var(--font-mono);font-size:13px;color:var(--amber);margin-bottom:8px;">${drillName}</div>`;

  // Performance stats row
  html += `<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">`;
  const statItems = [
    ['Iters', drill.n_iters],
    ['Best WR', Math.round(drill.best_win_rate*100)+'%'],
    ['Latest WR', Math.round(drill.latest_win_rate*100)+'%'],
    ['Episodes', totalEps.toLocaleString()],
    ['Steps', totalSteps.toLocaleString()],
    ['Elapsed', totalElapsed > 0 ? (totalElapsed < 3600 ? Math.round(totalElapsed/60)+'m' : (totalElapsed/3600).toFixed(1)+'h') : '—'],
    ['Gen/iter', avgGenTime.toFixed(1)+'s'],
    ['Train/iter', avgTrainTime.toFixed(1)+'s'],
    ['Steps/sec', stepsPerSec],
  ];
  statItems.forEach(([label, val]) => {
    html += `<div style="background:var(--bg-1);border:1px solid var(--border);border-radius:4px;padding:4px 10px;text-align:center;">
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-2);text-transform:uppercase;letter-spacing:0.5px;">${label}</div>
      <div style="font-family:var(--font-mono);font-size:14px;color:var(--text-0);font-weight:600;">${val}</div>
    </div>`;
  });
  html += `</div>`;

  html += `<div style="display:flex;gap:16px;margin-bottom:8px;">`;
  html += `<span style="font-family:var(--font-mono);font-size:11px;color:${drill.passed?'var(--green)':'var(--text-2)'};">${drill.passed?'PASSED':'IN PROGRESS'}</span>`;
  html += `</div>`;
  container.innerHTML = html;

  // Individual drill charts
  const metrics = [
    {key: 'win_rate', label: 'Win Rate', color: '#34d399', fmt: v => (v*100).toFixed(0)+'%'},
    {key: 'entropy', label: 'Entropy', color: '#67e8f9', fmt: v => v.toFixed(3)},
    {key: 'policy_loss', label: 'Actor Loss', color: '#c084fc', fmt: v => v.toFixed(3)},
    {key: 'value_loss', label: 'Critic Loss', color: '#fb923c', fmt: v => v.toFixed(4)},
    {key: 'alpha', label: 'Alpha (SAC)', color: '#e879f9', fmt: v => v !== undefined ? v.toFixed(3) : '—'},
    {key: 'q_mean', label: 'Q Mean', color: '#60a5fa', fmt: v => v !== undefined ? v.toFixed(2) : '—'},
    {key: 'mean_reward', label: 'Mean Reward', color: '#f5a623', fmt: v => v.toFixed(3)},
  ];

  const chartDiv = document.createElement('div');
  chartDiv.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:12px;';
  container.appendChild(chartDiv);

  // Track which chart is expanded (null = none)
  let expandedKey = null;

  function renderMetricChart(m, expanded) {
    const cardId = `drill-chart-${m.key}`;
    let card = document.getElementById(cardId);
    if (!card) {
      card = document.createElement('div');
      card.id = cardId;
      chartDiv.appendChild(card);
    }

    const isExpanded = expanded === m.key;
    card.style.cssText = `background:var(--bg-2);border:1px solid ${isExpanded ? 'var(--amber)' : 'var(--border)'};border-radius:6px;padding:12px;cursor:pointer;transition:all 0.2s;${isExpanded ? 'grid-column:1/-1;' : ''}`;
    card.onclick = () => {
      expandedKey = expandedKey === m.key ? null : m.key;
      metrics.forEach(mm => renderMetricChart(mm, expandedKey));
    };

    const cW = isExpanded ? 800 : 400;
    const cH = isExpanded ? 250 : 140;
    const cM = {top: 10, right: 55, bottom: 25, left: isExpanded ? 55 : 45};
    const cw = cW - cM.left - cM.right, ch = cH - cM.top - cM.bottom;
    const vals = drill.rows.map(r => r[m.key] || 0);

    // Header with label + latest value
    const latest = vals.length ? m.fmt(vals[vals.length - 1]) : '—';
    card.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
      <span style="font-family:var(--font-mono);font-size:${isExpanded ? '13' : '11'}px;color:var(--text-2);">${m.label}</span>
      <span style="font-family:var(--font-mono);font-size:${isExpanded ? '14' : '12'}px;color:${m.color};font-weight:600;">${latest}</span>
    </div>`;

    if (!vals.length) return;

    const svg = d3.select(card).append('svg')
      .attr('viewBox', `0 0 ${cW} ${cH}`)
      .style('width', '100%');
    const g = svg.append('g').attr('transform', `translate(${cM.left},${cM.top})`);

    const x = d3.scaleLinear().domain([1, Math.max(vals.length, 2)]).range([0, cw]);
    const vMin = d3.min(vals), vMax = d3.max(vals);
    const pad = Math.max(Math.abs(vMax - vMin) * 0.15, 0.001);
    // Fix domain for win_rate: always show 0-100%
    const yDomain = m.key === 'win_rate' ? [0, 1] : [vMin - pad, vMax + pad];
    const y = d3.scaleLinear().domain(yDomain).range([ch, 0]);

    // Grid lines
    g.append('g').call(d3.axisLeft(y).ticks(isExpanded ? 6 : 4).tickSize(-cw))
      .attr('class', 'axis')
      .selectAll('line').attr('stroke', 'var(--chart-grid)');
    g.append('g').attr('transform', `translate(0,${ch})`)
      .call(d3.axisBottom(x).ticks(isExpanded ? 10 : 5).tickFormat(d3.format('d')))
      .attr('class', 'axis');

    // Clip path
    const clipId = `clip-drill-${m.key}-${isExpanded ? 'exp' : 'sm'}`;
    g.append('clipPath').attr('id', clipId).append('rect').attr('width', cw).attr('height', ch);

    // Line
    const line = d3.line().x((d, i) => x(i + 1)).y(d => y(d));
    g.append('path').datum(vals)
      .attr('fill', 'none').attr('stroke', m.color)
      .attr('stroke-width', isExpanded ? 2 : 1.5)
      .attr('clip-path', `url(#${clipId})`)
      .attr('d', line);

    // Dots on expanded view
    if (isExpanded && vals.length <= 50) {
      g.selectAll('.dot').data(vals).enter().append('circle')
        .attr('cx', (d, i) => x(i + 1)).attr('cy', d => y(d))
        .attr('r', 3).attr('fill', m.color).attr('opacity', 0.7)
        .attr('clip-path', `url(#${clipId})`);
    }

    // Value label at end
    const ly = Math.max(2, Math.min(ch - 2, y(vals[vals.length - 1])));
    g.append('text').attr('x', cw + 4).attr('y', ly + 4)
      .attr('font-size', isExpanded ? '11px' : '9px')
      .attr('fill', m.color).attr('font-family', 'var(--font-mono)')
      .text(m.fmt(vals[vals.length - 1]));

    // 100% line for win_rate
    if (m.key === 'win_rate') {
      g.append('line').attr('x1', 0).attr('x2', cw)
        .attr('y1', y(1)).attr('y2', y(1))
        .attr('stroke', 'var(--green-dim)').attr('stroke-dasharray', '4,2')
        .attr('clip-path', `url(#${clipId})`);
    }
  }

  metrics.forEach(m => renderMetricChart(m, expandedKey));
}

init();
</script>
</body>
</html>
